<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torino Graffiti Haritası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        .popup-img { width: 100%; max-width: 250px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Haritayı Torino merkezli açıyoruz
        var map = L.map('map').setView([45.0703, 7.6869], 13);

        // Google Haritalar görünümünü çekiyoruz
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps'
        }).addTo(map);

        // 1. Fotoğraf için işaretçi (Örnek konum)
        var marker1 = L.marker([45.0750, 7.6800]).addTo(map);
        marker1.bindPopup('<b>Via Edoardo Calvo</b><br><img src="1.JPG" class="popup-img">');

        // 2. Fotoğraf için işaretçi (Örnek konum)
        var marker2 = L.marker([45.0680, 7.6900]).addTo(map);
        marker2.bindPopup('<b>Başka bir sokak</b><br><img src="2.JPG" class="popup-img">');

    </script>
</body>
</html>
