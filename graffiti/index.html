<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torino Graffiti Haritası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        .gallery-popup { max-height: 300px; overflow-y: auto; text-align: center; }
        .gallery-popup img { width: 100%; max-width: 250px; border-radius: 8px; margin-bottom: 10px; }
        .gallery-popup h3 { margin-top: 0; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([45.0703, 7.6869], 14);

        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps'
        }).addTo(map);

        // --- 1. SOKAK: Via Edoardo Calvo ---
        var sokak1Koordinatlar = [
            [45.0682, 7.6895], // Sokağın bir ucu
            [45.0675, 7.6890]  // Sokağın diğer ucu
        ];

        var sokak1Cizgi = L.polyline(sokak1Koordinatlar, {
            color: 'red',       
            weight: 6,          
            opacity: 0.7        
        }).addTo(map);

        sokak1Cizgi.on('mouseover', function(e) { this.setStyle({ color: 'yellow', weight: 8 }); });
        sokak1Cizgi.on('mouseout', function(e) { this.setStyle({ color: 'red', weight: 6 }); });

        // 8 fotoğrafın tamamı burada
        var sokak1Galeri = `
            <div class="gallery-popup">
                <h3>Via Edoardo Calvo Graffitileri</h3>
                <img src="1.jpg" alt="Graffiti 1">
                <img src="2.jpg" alt="Graffiti 2">
                <img src="3.jpg" alt="Graffiti 3">
                <img src="4.jpg" alt="Graffiti 4">
                <img src="5.jpg" alt="Graffiti 5">
                <img src="6.jpg" alt="Graffiti 6">
                <img src="7.jpg" alt="Graffiti 7">
                <img src="8.jpg" alt="Graffiti 8">
            </div>
        `;
        sokak1Cizgi.bindPopup(sokak1Galeri);

    </script>
</body>
</html>
